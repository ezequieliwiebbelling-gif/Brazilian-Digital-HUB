<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infraestrutura Digital e Energética do Brasil</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='20'>🗺️</text></svg>">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
:root{
 --bg:#0f172a;
 --panel:#111827;
 --accent:#df6d43;
 --text:#fff;
}

body{
 margin:0;
 display:grid;
 grid-template-columns:320px 1fr;
 height:100vh;
 font-family:Arial;
}

.sidebar{
 background:var(--bg);
 color:var(--text);
 padding:16px;
 overflow-y:auto;
}

.sidebar::-webkit-scrollbar{width:6px;}
.sidebar::-webkit-scrollbar-thumb{background:#ffffff33;border-radius:10px;}

#map{height:100%;}

.chip{
 background:#1e293b;
 border:none;
 color:white;
 padding:8px 12px;
 margin:4px;
 border-radius:20px;
 cursor:pointer;
}
.chip.active{background:var(--accent);}

.selection-card{
 background:var(--panel);
 padding:12px;
 margin-top:16px;
 border-radius:12px;
}

.toast{
 position:absolute;
 top:20px;
 right:20px;
 background:#10233a;
 color:white;
 padding:10px;
 border-radius:10px;
 opacity:0;
 transition:.3s;
}
.toast.show{opacity:1;}

table{
 width:100%;
 font-size:12px;
}
</style>
</head>

<body>

<aside class="sidebar">
<h2>Infraestrutura</h2>

<button class="chip active">Brasil inteiro</button>
<button class="chip">Eólicos</button>
<button class="chip">Cabos</button>

<input id="search" placeholder="Buscar localização..." style="width:100%;padding:8px;margin-top:10px;">

<div class="selection-card" id="card">
<strong>Painel rápido</strong>
<p>Selecione um item do mapa</p>
</div>
</aside>

<main id="map"></main>
<div id="toast" class="toast"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// MAPA
const map = L.map('map').setView([-14,-52],4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 maxZoom:19
}).addTo(map);

// TOAST
function toast(msg){
 const t=document.getElementById("toast");
 t.textContent=msg;
 t.classList.add("show");
 setTimeout(()=>t.classList.remove("show"),3000);
}

// DADOS
const PINHAL=[-30.2469,-50.2336];

const WIND_FARMS=[
{name:"Farroupilha",lat:PINHAL[0],lon:PINHAL[1]},
{name:"Honda Energy",lat:PINHAL[0],lon:PINHAL[1]},
{name:"Osório",lat:PINHAL[0],lon:PINHAL[1]}
];

const LANDING={
"Balneário Pinhal (RS)":PINHAL,
"Rio de Janeiro (RJ)":[-22.9,-43.2],
"Las Toninas (Argentina)":[-36.48,-56.7]
};

const CABLES=[{
name:"Malbec",
landing_points:"Balneário Pinhal (RS), Rio de Janeiro (RJ), Las Toninas (Argentina)"
}];

// OFFSET
function offset(data){
 let m={};
 return data.map(d=>{
  let k=d.lat+","+d.lon;
  let i=m[k]||0;
  m[k]=i+1;
  let r=0.03;
  return {...d,
   lat:d.lat+Math.sin(i)*r,
   lon:d.lon+Math.cos(i)*r
  }
 });
}

// CARD
function setCard(title,desc){
 document.getElementById("card").innerHTML=
 `<strong>${title}</strong><p>${desc}</p>`;
}

// CAMADAS
const windLayer=L.layerGroup();
const cableLayer=L.layerGroup();

// WIND
offset(WIND_FARMS).forEach(w=>{
 L.marker([w.lat,w.lon])
 .bindPopup(w.name)
 .on("click",()=>setCard("Parque Eólico",w.name))
 .addTo(windLayer);
});

// CABOS LINHA
CABLES.forEach(c=>{
 const pts=c.landing_points.split(",").map(p=>LANDING[p.trim()]);
 L.polyline(pts,{color:"orange"})
 .on("click",()=>setCard("Cabo Submarino",c.name))
 .addTo(cableLayer);
});

// CONTROLE
L.control.layers(null,{
"Eólicos":windLayer,
"Cabos":cableLayer
}).addTo(map);

windLayer.addTo(map);
cableLayer.addTo(map);

// TABELA CABOS
function truncate(t,max=80){
 return t.length>max?t.slice(0,max)+"...":t;
}

function buildTable(){
 return `<table>
 ${CABLES.map(c=>`
 <tr>
 <td title="${c.landing_points}">
 ${truncate(c.landing_points)}
 </td>
 </tr>`).join("")}
 </table>`;
}

// BOTÃO TABELA
const btn=L.control({position:"topright"});
btn.onAdd=function(){
 const b=L.DomUtil.create("button","chip");
 b.innerText="Tabela de cabos";
 b.onclick=()=>{
  L.popup().setLatLng(map.getCenter())
  .setContent(buildTable()).openOn(map);
 };
 return b;
}
btn.addTo(map);

// RESET
map.on("popupclose",()=>{
 setCard("Painel rápido","Selecione um item do mapa");
});

// CHIP ACTIVE
document.querySelectorAll(".chip").forEach(b=>{
 b.onclick=()=>{
  document.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
 }
});

// SEARCH
function debounce(fn,d){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),d)}}

document.getElementById("search")
.addEventListener("input",debounce(e=>{
 console.log(e.target.value);
},200));

</script>

</body>
</html>
