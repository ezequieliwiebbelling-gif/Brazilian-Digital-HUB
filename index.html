<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infraestrutura Digital e Energética do Brasil</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='20'>⚡</text></svg>">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
:root{
 --bg:#0f172a;
 --card:#111827;
 --accent:#df6d43;
 --text:#fff;
}

body{
 margin:0;
 display:grid;
 grid-template-columns:300px 1fr;
 height:100vh;
 font-family:Arial;
}

.sidebar{
 background:var(--bg);
 color:var(--text);
 padding:16px;
 overflow-y:auto;
}

.sidebar::-webkit-scrollbar{width:6px;}
.sidebar::-webkit-scrollbar-thumb{background:#ffffff33;border-radius:10px;}

#map{height:100%;}

.chip{
 background:#1e293b;
 color:white;
 border:none;
 padding:8px 12px;
 margin:4px;
 border-radius:20px;
 cursor:pointer;
}
.chip.active{background:var(--accent);}

.selection-card{
 background:var(--card);
 padding:12px;
 margin-top:16px;
 border-radius:12px;
}

.toast{
 position:absolute;
 top:20px;
 right:20px;
 background:#10233a;
 color:white;
 padding:10px;
 border-radius:10px;
 opacity:0;
 transition:.3s;
}
.toast.show{opacity:1;}
</style>
</head>

<body>

<aside class="sidebar">
<h2>Mapa</h2>

<button class="chip active">Brasil inteiro</button>
<button class="chip">Eólicos</button>
<button class="chip">Cabos</button>

<input id="search" placeholder="Buscar..." style="width:100%;padding:8px;margin-top:10px;">

<div class="selection-card" id="card">
<strong>Painel rápido</strong>
<p>Selecione um item do mapa</p>
</div>
</aside>

<main id="map"></main>

<div id="toast" class="toast"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// MAPA
const map = L.map('map').setView([-14,-52],4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 maxZoom:19
}).addTo(map);

// TOAST
function toast(msg){
 const el=document.getElementById("toast");
 el.textContent=msg;
 el.classList.add("show");
 setTimeout(()=>el.classList.remove("show"),3000);
}

// DATA
const PINHAL=[-30.2469,-50.2336];

const WIND=[
{name:"Farroupilha",lat:PINHAL[0],lon:PINHAL[1]},
{name:"Honda Energy",lat:PINHAL[0],lon:PINHAL[1]},
{name:"Osório",lat:PINHAL[0],lon:PINHAL[1]}
];

const LANDING={
"Balneário Pinhal (RS)":PINHAL,
"Rio de Janeiro (RJ)":[-22.9,-43.2],
"Las Toninas (Argentina)":[-36.48,-56.7]
};

const CABOS=[
{name:"Malbec",points:["Balneário Pinhal (RS)","Rio de Janeiro (RJ)","Las Toninas (Argentina)"]}
];

// OFFSET
function offset(data){
 let m={};
 return data.map(d=>{
  let k=d.lat+","+d.lon;
  let i=m[k]||0;
  m[k]=i+1;
  let r=0.03;
  return {...d,
   lat:d.lat+Math.sin(i)*r,
   lon:d.lon+Math.cos(i)*r
  }
 });
}

// CARD
function setCard(title,desc){
 document.getElementById("card").innerHTML=
 `<strong>${title}</strong><p>${desc}</p>`;
}

// WIND
offset(WIND).forEach(w=>{
 L.marker([w.lat,w.lon]).addTo(map)
 .bindPopup(w.name)
 .on("click",()=>setCard("Eólico",w.name));
});

// CABOS
CABOS.forEach(c=>{
 let coords=c.points.map(p=>LANDING[p]);
 L.polyline(coords,{color:"orange"}).addTo(map)
 .on("click",()=>setCard("Cabo",c.name));
});

// RESET CARD
map.on("popupclose",()=>{
 setCard("Painel rápido","Selecione um item do mapa");
});

// CHIP ACTIVE
document.querySelectorAll(".chip").forEach(b=>{
 b.onclick=()=>{
  document.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
 }
});

// DEBOUNCE
function debounce(fn,delay){
 let t;
 return (...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),delay);}
}

document.getElementById("search")
.addEventListener("input",debounce(e=>{
 console.log(e.target.value);
},200));

</script>

</body>
</html>
